spring.application.name=Campconnect

spring.jackson.serialization.write-dates-as-timestamps=false

spring.datasource.url=jdbc:mysql://localhost:3306/CAMPCONNECT?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

server.servlet.context-path=/campconnect
server.port=8085
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.root=INFO
logging.level.tn.esprit.spring.revisionexamen=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %level - %logger{60} - %msg%n
logging.pattern.file=%msg%n
logging.file.name=c:/log/spring_file.log
logging.logback.rollingpolicy.max-file-size=100KB

app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast256BitsLong1234567890
app.jwt.expiration-ms=86400000

# Jeu de démo JPA (DatabaseSeedRunner). false = ne rien insérer au démarrage.
app.db.seed=true