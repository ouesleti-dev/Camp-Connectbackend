spring.application.name=CampConnect

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:4306/CAMPCONNECT?&createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.jpa.open-in-view=false
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
##server Configuration
server.port=8088
server.servlet.context-path=/campConnect
### JWT ###
app.jwt.secret=MySuperSecretKeyForSpringSecurityX@261
app.jwt.expiration-ms=86400000
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
### FILE UPLOAD ###
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB
spring.main.log-startup-info=false